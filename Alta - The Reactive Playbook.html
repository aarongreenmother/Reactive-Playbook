  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

; }\n  .ddcol li b{ font-weight:var(--bold); }\n  .ddcol.do li::before{ content:\"\\2713\"; position:absolute; left:0; color:var(--go); font-weight:var(--bold); }\n  .ddcol.dont li::before{ content:\"\\00d7\"; position:absolute; left:0; color:var(--stop); font-weight:var(--bold); font-size:30px; top:-2px; }\n\n  /* phases */\n  .phase{ background:var(--slate); padding:30px 30px 34px; display:flex; flex-direction:column; }\n  .phase .pwhen{ font-size:17px; font-weight:var(--med); letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:14px; }\n  .phase .pname{ font-size:30px; font-weight:var(--light); line-height:1.12; margin-bottom:6px; }\n  .phase .pmode{ font-size:18px; font-weight:var(--med); letter-spacing:.04em; color:var(--watch); margin-bottom:16px; }\n  .phase .pbody{ font-size:22px; font-weight:var(--light); line-height:1.38; color:var(--t2); margin-bottom:14px; }\n  .phase .pbody b{ color:var(--white); }\n  .phase .plead{ font-size:18px; font-weight:var(--light); color:var(--t3); margin-top:auto; padding-top:10px; line-height:1.4; }\n  .phase .plead b{ color:var(--white); font-weight:var(--med); }\n\n  /* moment cards (2 per slide) */\n  .mcard{ background:var(--slate); padding:36px 40px 38px; display:flex; flex-direction:column; }\n  .mhead{ display:flex; align-items:baseline; justify-content:space-between; gap:20px; margin-bottom:6px; }\n  .mname{ font-size:38px; font-weight:var(--light); letter-spacing:-.01em; line-height:1.05; }\n  .mdate{ font-size:17px; font-weight:var(--med); letter-spacing:.1em; text-transform:uppercase; color:var(--t3); white-space:nowrap; }\n  .mchips{ display:flex; gap:12px; align-items:center; margin:14px 0 18px; flex-wrap:wrap; }\n  .chip{ font-size:15px; font-weight:var(--med); letter-spacing:.12em; text-transform:uppercase; padding:6px 14px; line-height:1; white-space:nowrap; }\n  .chip.t1{ background:var(--watch); color:#15110a; }\n  .chip.t2{ background:rgba(255,255,255,.16); color:var(--white); }\n  .chip.t3{ border:1px solid var(--line); color:var(--t2); }\n  .chip.own{ background:var(--white); color:#10171c; }\n  .chip.dw{ border:1px solid var(--stop); color:var(--stop); }\n  .midea{ font-size:25px; font-weight:var(--light); line-height:1.36; color:var(--white); margin-bottom:22px; }\n  .midea b{ font-weight:var(--bold); }\n  .mgrid{ display:grid; gap:14px; margin-top:auto; }\n  .mline{ display:grid; grid-template-columns:158px 1fr; gap:22px; align-items:start; padding-top:14px; border-top:1px solid var(--line-2); }\n  .mline .mk{ font-size:15px; font-weight:var(--med); letter-spacing:.12em; text-transform:uppercase; color:var(--t2); padding-top:3px; }\n  .mline.warn .mk{ color:var(--stop); }\n  .mline .mv{ font-size:21px; font-weight:var(--light); line-height:1.36; color:var(--t2); }\n  .mline .mv b{ color:var(--white); font-weight:var(--bold); }\n\n  /* clears (must-clear emphasis) */\n  .clears{ display:grid; gap:24px; }\n  .clear{ display:grid; grid-template-columns:auto 1fr; gap:30px; align-items:start; background:var(--slate); padding:34px 40px; }\n  .clear .cn{ width:62px; height:62px; border:1px solid var(--stop); color:var(--stop); display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:var(--med); }\n  .clear .cb{ font-size:29px; font-weight:var(--light); line-height:1.36; }\n  .clear .cb b{ font-weight:var(--bold); }\n  .clear .cb .tag-stop{ color:var(--stop); font-weight:var(--med); }\n\n  /* reach ladder */\n  .ladder{ display:grid; grid-template-columns:repeat(6,1fr); gap:16px; }\n  .rung{ background:var(--slate); padding:26px 22px 28px; display:flex; flex-direction:column; gap:14px; }\n  .rung .rn{ font-size:40px; font-weight:var(--light); opacity:.5; line-height:.9; }\n  .rung h4{ font-size:25px; font-weight:var(--bold); line-height:1.12; }\n  .rung .rwho{ font-size:15px; font-weight:var(--med); letter-spacing:.1em; text-transform:uppercase; color:var(--watch); }\n  .rung p{ font-size:19px; font-weight:var(--light); line-height:1.36; color:var(--t2); margin-top:auto; }\n\n  /* contents list */\n  .toc{ display:grid; grid-template-columns:1fr 1fr; gap:6px 80px; }\n  .toc .ti{ display:grid; grid-template-columns:64px 1fr; gap:24px; align-items:baseline; padding:18px 0; border-top:1px solid var(--line-2); }\n  .toc .ti .tn{ font-size:20px; font-weight:var(--med); color:var(--t3); letter-spacing:.08em; }\n  .toc .ti .tt{ font-size:30px; font-weight:var(--light); color:var(--white); }\n\n  /* logos */\n  .logo-rl{ width:208px; height:208px; background:url(\"681befe0-1d1e-483e-86bc-8caf3759eb8d\") center/contain no-repeat; }\n  .logo-mother{ width:440px; height:130px; background:url(\"87ea7da2-fa06-454e-bf9d-5a9f88869a19\") center/contain no-repeat; }\n\n  .spine{ font-size:60px; font-weight:var(--light); line-height:1.3; max-width:1500px; letter-spacing:-.01em; text-wrap:pretty; }\n  .spine b{ font-weight:var(--bold); }\n  .rule{ font-size:34px; font-weight:var(--light); font-style:italic; color:var(--t2); margin-top:40px; }\n\n  .note{ font-size:23px; font-weight:var(--light); line-height:1.44; color:var(--t2); }\n  .note b{ color:var(--white); font-weight:var(--bold); }\n  .eyebrow-min{ font-size:17px; font-weight:var(--med); letter-spacing:.18em; text-transform:uppercase; color:var(--t3); }\n\n  @media (max-width:760px){\n    .deck{ padding:14px 10px 50px; gap:16px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"deck\" id=\"deck\">\n<!-- 1 · TITLE -->\n<div class=\"frame\"><div class=\"slide bg-horizon-1\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:54px;\">Reality Labs × Mother<\u002Fdiv>\n    <h1 class=\"hero\">The Reactive<br><em>Playbook<\u002Fem><\u002Fh1>\n    <div class=\"sub\" style=\"margin-top:46px;\">Project Alta&nbsp;·&nbsp;Reactive Strategy&nbsp;·&nbsp;v1<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 2 · PREMISE STATEMENT -->\n<div class=\"frame\"><div class=\"slide bg-dark\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:48px;\">The premise<\u002Fdiv>\n    <p class=\"statement\">Alta earns its place in film culture by <b>loving movies out loud<\u002Fb> — not by selling glasses.<\u002Fp>\n    <p class=\"sub\" style=\"max-width:1180px; margin-top:54px; line-height:1.5;\">Social spots the moment and moves first. This is the shared reactive system — for the social team, and every function a moment touches. It shows the whole team how to react well, who to pull in, and when.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 3 · CONTENTS -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">00<\u002Fspan>&nbsp;Contents<\u002Fdiv>\n    <h2 class=\"s-head\">What’s inside<\u002Fh2>\n    <div class=\"body-area\">\n      <div class=\"toc\">\n        <div class=\"ti\"><span class=\"tn\">01<\u002Fspan><span class=\"tt\">Start here<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">02<\u002Fspan><span class=\"tt\">The brand in one breath<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">03<\u002Fspan><span class=\"tt\">The five principles<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">04<\u002Fspan><span class=\"tt\">The go / no-go filter<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">05<\u002Fspan><span class=\"tt\">Reactive triggers<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">06<\u002Fspan><span class=\"tt\">Pre-approved formats<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">07<\u002Fspan><span class=\"tt\">Who to loop in<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">08<\u002Fspan><span class=\"tt\">Voice cheat sheet<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">09<\u002Fspan><span class=\"tt\">Reactive by phase<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">10<\u002Fspan><span class=\"tt\">Moments across the year<\u002Fspan><\u002Fdiv>\n        <div class=\"ti\"><span class=\"tn\">11<\u002Fspan><span class=\"tt\">Worked example: Star Wars 50th<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 4 · §1 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">01 — Start here<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">How to use this on<br>a Monday morning<\u002Fh2>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 5 · §1 THREE MOVES -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">01<\u002Fspan>&nbsp;Start here<\u002Fdiv>\n    <p class=\"s-lead\" style=\"max-width:1400px;\">You don’t need to memorise the whole thing. <b>Three moves cover almost every decision<\u002Fb> — the fourth tells you when to call for help.<\u002Fp>\n    <div class=\"body-area\">\n      <div class=\"grid-2\" style=\"gap:34px 70px; flex:1; align-content:center;\">\n        <div class=\"step\"><div class=\"snum\">1<\u002Fdiv><div><h4>See a moment? Run it through the filter.<\u002Fh4><p>A release, a press story, a Letterboxd pile-up, a trending take — drop it into the go / no-go filter. Five quick yes/no questions tell you: <b>react, monitor, or ignore.<\u002Fb><\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><div class=\"snum\">2<\u002Fdiv><div><h4>Green light? Grab a pre-approved format.<\u002Fh4><p>Pick the matching template and ship it in Alta’s voice. These are built to go out <b>same-day without full campaign sign-off.<\u002Fb><\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><div class=\"snum\">3<\u002Fdiv><div><h4>Not sure? It’s a monitor or an ignore.<\u002Fh4><p>Hesitation is information. We’d rather miss a small moment than post one <b>a real cinephile would side-eye.<\u002Fb><\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><div class=\"snum\">4<\u002Fdiv><div><h4>Going bigger? Know who to call.<\u002Fh4><p>Anything past a quick post — touching talent, a studio title, paid media or the in-product store — <b>pulls in another team.<\u002Fb><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"note\" style=\"margin-top:14px; font-style:italic; font-size:25px; color:rgba(255,255,255,.82);\">The five principles are the “why” behind every call. Read them once — they’ll make 90% of your decisions for you.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 6 · §2 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">02 — Orientation<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">The brand in<br>one breath<\u002Fh2>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 7 · §2 ORIENTATION -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">02<\u002Fspan>&nbsp;Orientation<\u002Fdiv>\n    <p class=\"s-lead\">Everything in this playbook traces back to the campaign strategy. Here’s the ground we’re standing on.<\u002Fp>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"orient\">\n        <div class=\"orow\"><div class=\"ot\">What Alta is<\u002Fdiv><div class=\"od\">Meta Reality Labs’ lightweight VR glasses — a <b>portable cinema<\u002Fb>. A theatre-sized 5K screen, full 3D and Dolby sound that folds away to nothing. <i>“Entertainment heavyweights. Lightweight device.”<\u002Fi><\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\"><div class=\"ot\">Who we talk to<\u002Fdiv><div class=\"od\">Cinephiles — the <b>wholehearted fans<\u002Fb> of film and TV. People who already live in this culture.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\"><div class=\"ot\">Our cultural job<\u002Fdiv><div class=\"od\">Build and sustain <b>credibility<\u002Fb> by placing Alta inside the moments, people and spaces that define what’s credible in entertainment.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\"><div class=\"ot\">Our territory<\u002Fdiv><div class=\"od\">The <b>experience of great film and TV<\u002Fb> — scale, immersion, sound, the feeling of being inside the story. Not industry politics, not box-office scores, not celebrity noise.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 8 · §2 BEHAVIOURS -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">02<\u002Fspan>&nbsp;Orientation<\u002Fdiv>\n    <h2 class=\"s-head\">Every piece of work serves four behaviours<\u002Fh2>\n    <div class=\"body-area gap\" style=\"justify-content:center;\">\n      <div class=\"grid-4\">\n        <div class=\"panel\" style=\"padding:38px 32px;\"><div class=\"eyebrow-min\" style=\"margin-bottom:auto;\">Reactive lives here<\u002Fdiv><div style=\"font-size:46px; font-weight:var(--light); margin-top:90px;\">Credibility<\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"padding:38px 32px;\"><div class=\"eyebrow-min\" style=\"margin-bottom:auto;\">Reactive lives here<\u002Fdiv><div style=\"font-size:46px; font-weight:var(--light); margin-top:90px;\">Ritual<\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"padding:38px 32px; background:var(--slate-2); border:1px solid var(--line-2);\"><div class=\"eyebrow-min\" style=\"color:var(--t4); margin-bottom:auto;\">Never undercut it<\u002Fdiv><div style=\"font-size:46px; font-weight:var(--light); color:var(--t2); margin-top:90px;\">Clarity<\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"padding:38px 32px; background:var(--slate-2); border:1px solid var(--line-2);\"><div class=\"eyebrow-min\" style=\"color:var(--t4); margin-bottom:auto;\">Never undercut it<\u002Fdiv><div style=\"font-size:46px; font-weight:var(--light); color:var(--t2); margin-top:90px;\">Desirability<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"note\" style=\"max-width:1500px; margin-top:34px;\">Reactive content mostly drives <b>Credibility<\u002Fb> and <b>Ritual<\u002Fb> — that’s its whole point. It should never muddy the product message (<b>Clarity<\u002Fb>) or cheapen the brand (<b>Desirability<\u002Fb>). Paid and planned work carries the heavy lifting on those.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 9 · §3 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">03 — The rules<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">The five principles<\u002Fh2>\n    <p class=\"sub\" style=\"max-width:1180px; margin-top:40px; line-height:1.5;\">These govern <b style=\"font-weight:var(--bold);\">when<\u002Fb> and <b style=\"font-weight:var(--bold);\">how<\u002Fb> we react. Each one comes straight from the campaign strategy — not a generic social rulebook.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 10 · PRINCIPLE 1 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">03<\u002Fspan>&nbsp;Principle 1 of 5<\u002Fdiv>\n    <p class=\"statement\" style=\"font-size:74px; max-width:1560px; margin-top:8px;\">Enter as a film lover, not a tech brand.<\u002Fp>\n    <div class=\"body-area\" style=\"justify-content:flex-end;\">\n      <p class=\"note\" style=\"font-size:30px; max-width:1480px; margin-bottom:36px;\">Our right to speak in any film conversation comes from genuine fluency and love of cinema — <b>never from having a product to sell.<\u002Fb> If a post only makes sense as an ad, it isn’t for us. The whole credibility-building phase exists <i>before<\u002Fi> we ask for a sale; react in that spirit all year.<\u002Fp>\n      <div class=\"panel\" style=\"padding:28px 36px;\"><div class=\"eyebrow-min\" style=\"color:var(--watch); margin-bottom:12px;\">Why this is us<\u002Fdiv><div class=\"note\" style=\"font-size:23px; color:var(--t2);\">Cultural calendar — “place Alta inside the moments, people &amp; spaces that define what’s credible in entertainment.” The <b>Credibility<\u002Fb> behaviour.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 11 · PRINCIPLE 2 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">03<\u002Fspan>&nbsp;Principle 2 of 5<\u002Fdiv>\n    <p class=\"statement\" style=\"font-size:74px; max-width:1560px; margin-top:8px;\">Only when the watching is at stake.<\u002Fp>\n    <div class=\"body-area\" style=\"justify-content:flex-end;\">\n      <p class=\"note\" style=\"font-size:30px; max-width:1480px; margin-bottom:36px;\">Alta owns one thing: how great film and TV <i>deserves to be experienced<\u002Fi> — scale, immersion, sound, being inside the story. That’s the territory test. If a moment is about how something should be seen and felt, <b>we’re dead centre.<\u002Fb> If it’s industry gossip, box-office horse-race or celebrity noise unrelated to the work, it’s not our lane.<\u002Fp>\n      <div class=\"panel\" style=\"padding:28px 36px;\"><div class=\"eyebrow-min\" style=\"color:var(--watch); margin-bottom:12px;\">Why this is us<\u002Fdiv><div class=\"note\" style=\"font-size:23px; color:var(--t2);\">Hardware deck — “entertainment as it’s meant to be felt”; the RTBs: 5K, full 3D, Dolby, theatre-sized screen.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 12 · PRINCIPLE 3 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">03<\u002Fspan>&nbsp;Principle 3 of 5<\u002Fdiv>\n    <p class=\"statement\" style=\"font-size:74px; max-width:1560px; margin-top:8px;\">Add to the ritual — never hijack it.<\u002Fp>\n    <div class=\"body-area\" style=\"justify-content:flex-end;\">\n      <p class=\"note\" style=\"font-size:30px; max-width:1480px; margin-bottom:36px;\">Cinephile rituals are sacred: logging on Letterboxd, ranking, rewatching, marking anniversaries, the awards-season liturgy. We take part the way a devoted fan would, <b>adding something real<\u002Fb> — and we never bend the ritual into a sales message. A list or review that’s secretly an ad gets us thrown out of the room.<\u002Fp>\n      <div class=\"panel\" style=\"padding:28px 36px;\"><div class=\"eyebrow-min\" style=\"color:var(--watch); margin-bottom:12px;\">Why this is us<\u002Fdiv><div class=\"note\" style=\"font-size:23px; color:var(--t2);\">The <b>Ritual<\u002Fb> behaviour; calendar — Letterboxd &amp; podcast partnerships “give cinephiles tangible ways to connect”; the re-release / anniversary strategy.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 13 · PRINCIPLE 4 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">03<\u002Fspan>&nbsp;Principle 4 of 5<\u002Fdiv>\n    <p class=\"statement\" style=\"font-size:74px; max-width:1560px; margin-top:8px;\">The work is the hero; the product whispers.<\u002Fp>\n    <div class=\"body-area\" style=\"justify-content:flex-end;\">\n      <p class=\"note\" style=\"font-size:30px; max-width:1480px; margin-bottom:36px;\">In reactive content the film, the craft, the moment is the foreground. Alta’s point of view — <i>this is how it deserves to be felt<\u002Fi> — is the connective tissue. The product itself is the lightest possible touch: a logline, a sign-off, a visual cue. <b>Never a spec list.<\u002Fb> Lead with the emotion of cinema; let lightness speak last.<\u002Fp>\n      <div class=\"panel\" style=\"padding:28px 36px;\"><div class=\"eyebrow-min\" style=\"color:var(--watch); margin-bottom:12px;\">Why this is us<\u002Fdiv><div class=\"note\" style=\"font-size:23px; color:var(--t2);\">Hardware deck’s tiered messaging: land the <b>emotional<\u002Fb> benefit of lightness first, functional second; “introduce the product in a lighter world.”<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 14 · PRINCIPLE 5 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">03<\u002Fspan>&nbsp;Principle 5 of 5<\u002Fdiv>\n    <p class=\"statement\" style=\"font-size:74px; max-width:1560px; margin-top:8px;\">Side with the craft; skip the cheap take.<\u002Fp>\n    <div class=\"body-area\" style=\"justify-content:flex-end;\">\n      <p class=\"note\" style=\"font-size:30px; max-width:1480px; margin-bottom:36px;\">We’re on the side of quality, devotion and real fandom — the company of Scorsese, Coogler, Gerwig, Cameron, A24, Letterboxd. We don’t dunk, we don’t pile on, and we never chase a viral hot-take that would make a real cinephile cringe. <b>When a call is close, the more reverent, more genuinely-fan move wins.<\u002Fb><\u002Fp>\n      <div class=\"panel\" style=\"padding:28px 36px;\"><div class=\"eyebrow-min\" style=\"color:var(--watch); margin-bottom:12px;\">Why this is us<\u002Fdiv><div class=\"note\" style=\"font-size:23px; color:var(--t2);\">The auteur talent calibre &amp; partners across the plan (A24, Letterboxd, The Ringer / Rewatchables); the prestige tone throughout.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 15 · §4 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">04 — The fast decision tool<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">The go / no-go filter<\u002Fh2>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 16 · §4 THE FIVE GATES -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">04<\u002Fspan>&nbsp;The go / no-go filter<\u002Fdiv>\n    <p class=\"s-lead\">Run any moment through these five gates, <b>in order<\u002Fb>. The first “no” gives you your answer.<\u002Fp>\n    <div class=\"tags\" style=\"margin-top:26px;\">\n      <span class=\"tag go\"><span class=\"dot\"><\u002Fspan>React<\u002Fspan>\n      <span class=\"tag watch\"><span class=\"dot\"><\u002Fspan>Monitor<\u002Fspan>\n      <span class=\"tag stop\"><span class=\"dot\"><\u002Fspan>Ignore<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center; margin-top:24px;\">\n      <div>\n        <div class=\"gate\"><span class=\"gn\">G1<\u002Fspan><span class=\"gq\">Is it about <b>film, TV, or the experience of watching<\u002Fb> it?<\u002Fspan><span class=\"gx stop\">No → Ignore<\u002Fspan><\u002Fdiv>\n        <div class=\"gate\"><span class=\"gn\">G2<\u002Fspan><span class=\"gq\">Could Alta say this <b>as a genuine film fan<\u002Fb> — would a cinephile nod, not cringe?<\u002Fspan><span class=\"gx stop\">No → Ignore<\u002Fspan><\u002Fdiv>\n        <div class=\"gate\"><span class=\"gn\">G3<\u002Fspan><span class=\"gq\">Is there a <b>craft / scale / immersion / ritual angle<\u002Fb> that connects to who we are?<\u002Fspan><span class=\"gx watch\">No → Monitor<\u002Fspan><\u002Fdiv>\n        <div class=\"gate\"><span class=\"gn\">G4<\u002Fspan><span class=\"gq\">Is there <b>real, organic momentum right now<\u002Fb> — energy we didn’t manufacture?<\u002Fspan><span class=\"gx watch\">No → Monitor<\u002Fspan><\u002Fdiv>\n        <div class=\"gate\"><span class=\"gn\">G5<\u002Fspan><span class=\"gq\">Can we add <b>something worth saying in the next few hours<\u002Fb>, and is it safe (no tragedy / scandal / flame-war)?<\u002Fspan><span class=\"gx watch\">No → Monitor<\u002Fspan><\u002Fdiv>\n        <div class=\"gate win\"><span class=\"gq\">All five yes? → <b>React.<\u002Fb><\u002Fspan><span class=\"gx\">Go<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 17 · §4 TIER THE RESPONSE -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">04<\u002Fspan>&nbsp;The go / no-go filter<\u002Fdiv>\n    <h2 class=\"s-head\">If you’re reacting, tier the response<\u002Fh2>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"grid-3\" style=\"align-items:stretch;\">\n        <div class=\"tier\"><div class=\"tl\">Tier 1<\u002Fdiv><h4>Light touch<\u002Fh4><p>A like, share, reply or repost — real-but-small moments. <b>Social team only.<\u002Fb> Minutes, no one else needed.<\u002Fp><\u002Fdiv>\n        <div class=\"tier\"><div class=\"tl\">Tier 2<\u002Fdiv><h4>Owned post<\u002Fh4><p><b>Social executes<\u002Fb>, same-day. Quick-check flags: features <b>talent<\u002Fb>? → Talent SPM. Names a <b>studio film / IP<\u002Fb>? → BD·PMM. Rides a <b>press story<\u002Fb>? → Comms.<\u002Fp><\u002Fdiv>\n        <div class=\"tier\"><div class=\"tl\">Tier 3<\u002Fdiv><h4>Bigger swing<\u002Fh4><p>Multi-asset, creator-led or paid. Major moments only. <b>Loop in the lead + partners<\u002Fb>: FOA/DRM (paid), Industry SPMs (events), BD·PMM (big-deal IP), Store, Lifecycle.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 18 · §4 RED LINES -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\" style=\"color:var(--stop);\"><span style=\"color:var(--stop);\">04<\u002Fspan>&nbsp;Red lines<\u002Fdiv>\n    <h2 class=\"s-head\">Never react, whatever the momentum<\u002Fh2>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"redlines\">\n        <div class=\"rl\">Tragedy, death, disaster, or anyone’s grief<\u002Fdiv>\n        <div class=\"rl\">Active scandal, controversy, cancellation or pile-on<\u002Fdiv>\n        <div class=\"rl\">Politics, religion, or divisive social issues not about the film itself<\u002Fdiv>\n        <div class=\"rl\">Anything that mocks talent, fans or a fandom<\u002Fdiv>\n        <div class=\"rl\">Anything needing a product claim we can’t stand behind<\u002Fdiv>\n        <div class=\"rl\">Riding another brand’s crisis — or another brand’s moment<\u002Fdiv>\n        <div class=\"rl\">Anything outside our territory just because it’s trending<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 19 · §5 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">05 — What to react to<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">The four reactive triggers<\u002Fh2>\n    <p class=\"sub\" style=\"max-width:1180px; margin-top:40px; line-height:1.5;\">The cultural moments most relevant to Alta. For each: when it’s worth it, the angle, and what to watch.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 20 · TRIGGER 1 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">05<\u002Fspan>&nbsp;Trigger 01<\u002Fdiv>\n    <h2 class=\"s-head\">New film releases<\u002Fh2>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div>\n        <div class=\"kv\"><div class=\"kvk\">In territory<\u002Fdiv><div class=\"kvv\">An <b>event / theatrical film where the experience is the story<\u002Fb> — visually ambitious, immersive, big-screen, the kind cinephiles tell each other to “see properly.” The tentpoles (<i>Avengers: Doomsday, Dune Pt 3, Spider-Man: Beyond, The Batman Part II<\u002Fi>) and the auteur / prestige slate (<i>Klara and the Sun, Panic Carefully, Thomas Crown Affair, Children of Blood &amp; Bone<\u002Fi>, the A24 slate).<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv skip\"><div class=\"kvk\">Skip when<\u002Fdiv><div class=\"kvv\">There’s no craft or experience angle, it’s disposable, or we couldn’t honestly say <i>“this deserves the biggest screen and the fullest sound.”<\u002Fi><\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\"><div class=\"kvk\">Our angle<\u002Fdiv><div class=\"kvv\">Celebrate the craft Alta is built to deliver — the scale, the cinematography, the sound — <b>as a fan, not a salesperson<\u002Fb>. The unspoken line is always “this is what Alta was made for,” but we say it like a believer.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\"><div class=\"kvk\">Watch<\u002Fdiv><div class=\"kvv\">Release calendars, opening weekends, first-reactions, and the “you have to see this in a theatre” chatter.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv loop\"><div class=\"kvk\">Loop in<\u002Fdiv><div class=\"kvv\">If it’s a <b>studio title we’re integrating or negotiating<\u002Fb>, BD·PMM should sight it first. Otherwise social-led.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 21 · TRIGGER 2 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">05<\u002Fspan>&nbsp;Trigger 02<\u002Fdiv>\n    <h2 class=\"s-head\">PR narrative hooks<\u002Fh2>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div>\n        <div class=\"kv\"><div class=\"kvk\">Spot the hook<\u002Fdiv><div class=\"kvv\">A story is ours when the press narrative is <b>already about the viewing experience or the craft<\u002Fb> — “shot for the biggest screen,” “must be seen in IMAX,” “the sound will floor you,” a director on how they want it felt, or a re-release getting the “see it again, properly” treatment (<i>Titanic 30, Star Wars 50, Get Out 10<\u002Fi>).<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\"><div class=\"kvk\">Ride it<\u002Fdiv><div class=\"kvv\">Build on the narrative that’s <b>already there<\u002Fb>. Amplify the maker’s own words, add Alta’s POV, keep product light. Never invent a product claim to force a fit.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv skip\"><div class=\"kvk\">Hard stop<\u002Fdiv><div class=\"kvv\">Never ride a PR story about scandal, controversy or tragedy. <b>Craft- and experience-led hooks only.<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\"><div class=\"kvk\">Watch<\u002Fdiv><div class=\"kvv\">Director / DP / sound interviews, “how to watch it” press, festival craft buzz, anniversary press cycles.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv loop\"><div class=\"kvk\">Loop in<\u002Fdiv><div class=\"kvv\"><b>Comms<\u002Fb> owns media relations — align so we’re not crossing their messaging, especially near product or demo news.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 22 · TRIGGER 3 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">05<\u002Fspan>&nbsp;Trigger 03<\u002Fdiv>\n    <h2 class=\"s-head\">Cinephile community behaviour<\u002Fh2>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div>\n        <div class=\"kv\"><div class=\"kvk\">The deal<\u002Fdiv><div class=\"kvv\">This is where credibility is <b>won or lost<\u002Fb>. We take part in the <i>form<\u002Fi> of the community’s rituals as a genuine fan — and the second it feels like brand activity, we’ve lost.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\"><div class=\"kvk\">Letterboxd<\u002Fdiv><div class=\"kvv\">Behave like a cinephile account: <b>log rewatches, write short honest reviews, build themed lists.<\u002Fb> Lists are our open goal — “Films that earn the biggest screen,” “Sound you feel in your chest.” Picks must be credible; writing must be real; the product can be the <i>lens<\u002Fi>, never the punchline.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\"><div class=\"kvk\">Rankings<\u002Fdiv><div class=\"kvv\">Weigh in with honest, defensible takes and invite the community (“Your top 5 sound-design films — go”). React to genuine ranking moments — a film cracking the Letterboxd Top 250, a viral ranking debate.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv skip\"><div class=\"kvk\">Stay out of<\u002Fdiv><div class=\"kvv\">Fan wars, identity flame-wars, and anything toxic. Only enter discourse about <b>the work<\u002Fb>.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\"><div class=\"kvk\">Voice here<\u002Fdiv><div class=\"kvv\">Peer-to-peer, witty, low-ego, knowledgeable. The win is a <b>real cinephile<\u002Fb> liking us — not just our own followers.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv loop\"><div class=\"kvk\">Loop in<\u002Fdiv><div class=\"kvv\">Mostly <b>social / Creator &amp; Influencer<\u002Fb>. A24 or Letterboxd partnership moments → <b>Partnerships / BD<\u002Fb>.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 23 · TRIGGER 4 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">05<\u002Fspan>&nbsp;Trigger 04<\u002Fdiv>\n    <h2 class=\"s-head\">Ongoing cultural conversations<\u002Fh2>\n    <p class=\"s-lead\" style=\"margin-top:6px;\">Enter only when <b>all four<\u002Fb> are true: organic volume we didn’t create · it’s about film or the experience of watching · we can add something a real fan would value · it’s <b>still climbing<\u002Fb>. Miss one → monitor, don’t post.<\u002Fp>\n    <div class=\"body-area gap\" style=\"justify-content:center;\">\n      <div class=\"grid-3\" style=\"gap:18px 40px;\">\n        <div class=\"kv\" style=\"border-top:none; padding:14px 0;\"><div class=\"kvk\">Letterboxd<\u002Fdiv><div class=\"kvv\" style=\"font-size:23px;\">Lists, reviews, ritual. Reverent, witty, genuine.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\" style=\"border-top:none; padding:14px 0;\"><div class=\"kvk\">Twitter / X<\u002Fdiv><div class=\"kvv\" style=\"font-size:23px;\">Fast, funny, a sharp one-liner — <b>never the cheap dunk.<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\" style=\"border-top:none; padding:14px 0;\"><div class=\"kvk\">Instagram<\u002Fdiv><div class=\"kvv\" style=\"font-size:23px;\">The reverent visual — a frame, a poster, “the shot.” Restrained captions.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\" style=\"border-top:none; padding:14px 0;\"><div class=\"kvk\">TikTok<\u002Fdiv><div class=\"kvv\" style=\"font-size:23px;\">Creator-led. Lean on planned creator voices rather than the brand talking.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\" style=\"border-top:none; padding:14px 0;\"><div class=\"kvk\">Reddit&nbsp;(r/movies)<\u002Fdiv><div class=\"kvv\" style=\"font-size:23px;\">Allergic to brands. <b>Lurk mostly<\u002Fb>; contribute rarely, only with real substance.<\u002Fdiv><\u002Fdiv>\n        <div class=\"kv\" style=\"border-top:none; padding:14px 0;\"><div class=\"kvk\">Twitch<\u002Fdiv><div class=\"kvv\" style=\"font-size:23px;\">Watchalong energy — tied to our planned fan watchalongs.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"note\" style=\"margin-top:18px;\"><b>Loop in:<\u002Fb> social-led; escalate by tier. Paid push → FOA/DRM; surfacing in-product → Store.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 24 · §6 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">06 — The toolkit<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">Pre-approved formats<\u002Fh2>\n    <p class=\"sub\" style=\"max-width:1240px; margin-top:40px; line-height:1.5;\">Plug-and-play templates in Alta’s voice. If a moment passes the filter, <b>these go out same-day without full campaign sign-off.<\u002Fb> Example lines are starting points, not locked copy.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 25 · FORMATS · NEW RELEASES -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">06<\u002Fspan>&nbsp;Formats · For new releases<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"grid-3\" style=\"align-items:stretch;\">\n        <div class=\"fcard\"><div class=\"ftop\"><h4>“Built for this” frame<\u002Fh4><span class=\"chan\">IG · X<\u002Fspan><\u002Fdiv><p>One striking still or poster + a single fan line celebrating the craft. Product = logo lockup only.<\u002Fp><div class=\"ex\"><span class=\"lab\">e.g.<\u002Fspan><span class=\"line\">“Some films you watch. This one, you stand inside.”<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>The opening-weekend list<\u002Fh4><span class=\"chan\">Letterboxd · IG<\u002Fspan><\u002Fdiv><p>A list spun off the new release. Genuine curation, Alta as the curator’s eye.<\u002Fp><div class=\"ex\"><span class=\"lab\">e.g.<\u002Fspan><span class=\"line\">“Loved the scale of [film]? Five more to see at maximum size.”<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>Craft callout<\u002Fh4><span class=\"chan\">X · IG<\u002Fspan><\u002Fdiv><p>A short thread or carousel on one craft element — the sound, the cinematography, the world-building — and why it deserves to be <i>felt<\u002Fi>, not just seen. Fan-energy, lightly educational.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 26 · FORMATS · PR HOOKS -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">06<\u002Fspan>&nbsp;Formats · For PR hooks<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"grid-3\" style=\"align-items:stretch;\">\n        <div class=\"fcard\"><div class=\"ftop\"><h4>Amplify the maker<\u002Fh4><span class=\"chan\">X · IG<\u002Fspan><\u002Fdiv><p>When a director or DP says how a film should be experienced, repost or quote with quiet agreement.<\u002Fp><div class=\"ex\"><span class=\"lab\">e.g.<\u002Fspan><span class=\"line\">“[Maker] wants it felt as big as humanly possible. Same.”<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>“See it properly” → “bring it with you”<\u002Fh4><span class=\"chan\">X · IG<\u002Fspan><\u002Fdiv><p>Ride a “see this on the big screen” narrative; our answer turns the hook into our POV in one move.<\u002Fp><div class=\"ex\"><span class=\"lab\">e.g.<\u002Fspan><span class=\"line\">“See it on the biggest screen you can. Or take the biggest screen with you.”<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>Anniversary rewatch ride<\u002Fh4><span class=\"chan\">Letterboxd · IG<\u002Fspan><\u002Fdiv><p>When a classic returns (Titanic 30, Star Wars 50), honour the rewatch ritual and make the case for experiencing it at full scale again.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 27 · FORMATS · CINEPHILE COMMUNITY -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">06<\u002Fspan>&nbsp;Formats · For cinephile community<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"grid-3\" style=\"align-items:stretch;\">\n        <div class=\"fcard\"><div class=\"ftop\"><h4>Themed Letterboxd list<\u002Fh4><span class=\"chan\">Letterboxd<\u002Fspan><\u002Fdiv><p>Pre-approved themes: immersion / scale · sound design · rewatches · seasonal. Real writing, credible picks. Product is the lens, never the headline.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>“Your top 5 ___?” prompt<\u002Fh4><span class=\"chan\">X · IG · LB<\u002Fspan><\u002Fdiv><p>A ranking invitation — and Alta answers honestly too. Low-ego, fan-to-fan.<\u002Fp><div class=\"ex\"><span class=\"lab\">e.g.<\u002Fspan><span class=\"line\">“Five films you’d happily rewatch tonight. Ours below — yours?”<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>Genuine log &amp; review<\u002Fh4><span class=\"chan\">Letterboxd<\u002Fspan><\u002Fdiv><p>Alta’s account reviews and logs like a real fan — especially rewatches and re-releases. Short, honest, sometimes funny. <b>No product mention.<\u002Fb> Pure credibility-building.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 28 · FORMATS · ONGOING CONVERSATIONS -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">06<\u002Fspan>&nbsp;Formats · For ongoing conversations<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"grid-3\" style=\"align-items:stretch;\">\n        <div class=\"fcard\"><div class=\"ftop\"><h4>The quick take<\u002Fh4><span class=\"chan\">X<\u002Fspan><\u002Fdiv><p>A fast, defensible, witty one-liner on a craft or experience debate. Culturally fluent — and never the cheap dunk.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>The reverent visual<\u002Fh4><span class=\"chan\">IG<\u002Fspan><\u002Fdiv><p>A single frame or poster honouring a moment the culture’s talking about, with a restrained caption. Pure craft worship.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ftop\"><h4>Creator-amplified entry<\u002Fh4><span class=\"chan\">TikTok · YT<\u002Fspan><\u002Fdiv><p>Enter a discourse moment through our creator network rather than the brand voice. <b>Brand amplifies, creators carry.<\u002Fb><\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 29 · §7 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">07 — Working cross-functionally<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">Who to loop in<\u002Fh2>\n    <p class=\"sub\" style=\"max-width:1280px; margin-top:40px; line-height:1.5;\">Social spots the moment and drafts the move — but the second it touches <b>talent, a studio title, paid media, the in-product store or PR<\u002Fb>, someone else owns a piece.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 30 · §7 MUST CLEAR -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\" style=\"color:var(--stop);\"><span style=\"color:var(--stop);\">07<\u002Fspan>&nbsp;Stop until cleared<\u002Fdiv>\n    <h2 class=\"s-head\">Two things to clear before<br>anything goes public<\u002Fh2>\n    <div class=\"body-area gap\" style=\"justify-content:center;\">\n      <div class=\"clears\">\n        <div class=\"clear\"><div class=\"cn\">1<\u002Fdiv><div class=\"cb\"><b>Featuring named talent?<\u002Fb> → <span class=\"tag-stop\">Talent SPM sign-off, first.<\u002Fspan> A reactive post can cut across a live talent deal — never freelance a person’s name or likeness.<\u002Fdiv><\u002Fdiv>\n        <div class=\"clear\"><div class=\"cn\">2<\u002Fdiv><div class=\"cb\"><b>Referencing a specific studio film or IP?<\u002Fb> → <span class=\"tag-stop\">BD·PMM clearance, first.<\u002Fspan> These relationships (Disney, A24 and others) are active negotiations — an off-base post can cost a Big Deal.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"note\" style=\"color:var(--t3); font-size:22px;\">Everything that follows is “bring them in to go bigger.” These two are “stop until cleared.”<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 31 · §7 TEAMS A -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">07<\u002Fspan>&nbsp;Marketing, engagement &amp; in-product<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"orient\">\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Social / Creator &amp; Influencer<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\"><b>The engine.<\u002Fb> Owns reactive execution and creator relationships — spots moments, drafts and ships. Leads everything here.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Growth Team (FOA)<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Owns paid placements across the Family of Apps (IG, WhatsApp, Facebook). Loop in to put paid weight behind a winning moment.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">DRM (Direct Response)<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Owns performance and conversion. Loop in when a moment can drive direct action, not just awareness.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Retail Team<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Owns physical storefront presence. Loop in for retail tie-ins to a cultural moment.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Store Team<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Owns the in-product store — can <b>pin<\u002Fb> content and fire <b>push notifications<\u002Fb>. Loop in to surface a big moment inside Alta, not just on social.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 32 · §7 TEAMS B -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">07<\u002Fspan>&nbsp;Comms, partnerships &amp; lifecycle<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"orient\">\n        <div class=\"orow\" style=\"padding:16px 4px;\"><div class=\"ot\">Comms Team<\u002Fdiv><div class=\"od\" style=\"font-size:25px;\">Owns PR and media relations. Loop in for anything riding a press narrative, or any post near product / demo news.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:16px 4px;\"><div class=\"ot\">Talent SPMs<\u002Fdiv><div class=\"od\" style=\"font-size:25px;\">Own high-profile talent relationships. <b>Must clear<\u002Fb> anything featuring named talent.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:16px 4px;\"><div class=\"ot\">Industry SPMs<\u002Fdiv><div class=\"od\" style=\"font-size:25px;\">Own Meta’s presence at award shows and festivals. Loop in for anything reactive around Sundance, the Oscars, ceremonies, events.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:16px 4px;\"><div class=\"ot\">BD &amp; PMM<\u002Fdiv><div class=\"od\" style=\"font-size:25px;\">Lead studio conversations (Disney, A24); own what’s integrated and which titles fit which audience. <b>Must clear<\u002Fb> reactive use of specific studio films / IP.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:16px 4px;\"><div class=\"ot\">RL Partnerships<\u002Fdiv><div class=\"od\" style=\"font-size:25px;\">Own “Big Deal” brand partnerships. Loop in when a moment intersects a flagship partnership.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:16px 4px;\"><div class=\"ot\">Content Partnerships<\u002Fdiv><div class=\"od\" style=\"font-size:25px;\">Keep high-quality content flowing onto the platform. Loop in when a moment leans on a title’s availability.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:16px 4px;\"><div class=\"ot\">Web &amp; Lifecycle<\u002Fdiv><div class=\"od\" style=\"font-size:25px;\">Owns email and push within Brand Marketing. Loop in to extend a moment to existing users for retention.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 33 · §7 REACH LADDER -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">07<\u002Fspan>&nbsp;How far a moment can travel<\u002Fdiv>\n    <p class=\"s-lead\">When a reactive moment is genuinely big, it doesn’t stop at one post. Most moments stop at rungs 1–2; climbing higher is a Tier 3 call.<\u002Fp>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"ladder\">\n        <div class=\"rung\"><div class=\"rn\">1<\u002Fdiv><h4>Social post<\u002Fh4><p class=\"rwho\">Social / Creator<\u002Fp><p>The reactive move goes live where the conversation already is.<\u002Fp><\u002Fdiv>\n        <div class=\"rung\"><div class=\"rn\">2<\u002Fdiv><h4>Creator amplification<\u002Fh4><p class=\"rwho\">Creator &amp; Influencer<\u002Fp><p>Real voices carry it further than the brand ever can.<\u002Fp><\u002Fdiv>\n        <div class=\"rung\"><div class=\"rn\">3<\u002Fdiv><h4>Paid weight<\u002Fh4><p class=\"rwho\">FOA / DRM<\u002Fp><p>Put media behind it across the Family of Apps.<\u002Fp><\u002Fdiv>\n        <div class=\"rung\"><div class=\"rn\">4<\u002Fdiv><h4>In-product<\u002Fh4><p class=\"rwho\">Store Team<\u002Fp><p>Pin it or push it inside Alta to reach owners directly.<\u002Fp><\u002Fdiv>\n        <div class=\"rung\"><div class=\"rn\">5<\u002Fdiv><h4>Lifecycle<\u002Fh4><p class=\"rwho\">Web &amp; Lifecycle<\u002Fp><p>Email / push to bring users back to the moment.<\u002Fp><\u002Fdiv>\n        <div class=\"rung\"><div class=\"rn\">6<\u002Fdiv><h4>Retail &amp; industry<\u002Fh4><p class=\"rwho\">Retail / Industry<\u002Fp><p>Tie it to a storefront or an event when the moment truly warrants.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 34 · §8 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">08 — How we sound<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">Voice cheat sheet<\u002Fh2>\n    <p class=\"sub\" style=\"max-width:1180px; margin-top:40px; line-height:1.5;\">Warm, fluent, light on its feet. Short and evocative. Reverent about the work, never precious.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 35 · §8 THE REGISTER -->\n<div class=\"frame\"><div class=\"slide bg-dark\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:46px;\">The register, anchored in our own copy<\u002Fdiv>\n    <p class=\"statement\" style=\"font-size:56px; line-height:1.34;\">“The weight is over.” <span style=\"color:var(--t4);\">·<\u002Fspan> “Cinema in your carry on.” <span style=\"color:var(--t4);\">·<\u002Fspan> “The show must go anywhere.” <span style=\"color:var(--t4);\">·<\u002Fspan> “Surround yourself with cinema.”<\u002Fp>\n    <p class=\"sub\" style=\"max-width:1160px; margin-top:50px; line-height:1.5;\">Short. Evocative. Lightness is the only flex. If a reactive line could sit beside these, you’ve got the voice.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 36 · §8 DO / DON'T -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">08<\u002Fspan>&nbsp;Voice cheat sheet<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"grid-2\" style=\"gap:80px;\">\n        <div class=\"ddcol do\">\n          <h4>Do<\u002Fh4>\n          <ul>\n            <li>Talk about films like a fan who’s seen everything.<\u002Fli>\n            <li>Praise craft <b>specifically<\u002Fb> — the sound, the scale, the shot.<\u002Fli>\n            <li>Be brief. One good line beats a paragraph.<\u002Fli>\n            <li>Let lightness be the product’s only flex.<\u002Fli>\n            <li>Earn the cinephile’s nod, not just the easy like.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"ddcol dont\">\n          <h4>Don’t<\u002Fh4>\n          <ul>\n            <li>List specs or features. (Save the RTBs for paid.)<\u002Fli>\n            <li>Make the glasses the hero of a reactive post.<\u002Fli>\n            <li>Dunk, pile on, or chase a cringe take.<\u002Fli>\n            <li>Force a product line where it doesn’t belong.<\u002Fli>\n            <li>Speak in marketing — “Experience the future of…”<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 37 · §9 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">09 — Timing<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">Reactive by phase<\u002Fh2>\n    <p class=\"sub\" style=\"max-width:1180px; margin-top:40px; line-height:1.5;\">Same principles all year — the <b>volume, the boldness and the lead team<\u002Fb> shift with the calendar.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 38 · §9 THE FOUR PHASES -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">09<\u002Fspan>&nbsp;Reactive by phase<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"grid-4\" style=\"align-items:stretch;\">\n        <div class=\"phase\"><div class=\"pwhen\">Sep – Nov ’26<\u002Fdiv><div class=\"pname\">Clarity<\u002Fdiv><div class=\"pmode\">Support PR<\u002Fdiv><div class=\"pbody\">Enter the entertainment conversation at <b>Meta Connect (Sep 23)<\u002Fb> — a hero product film makes it obvious what Alta is. Reactive plays <b>support to PR<\u002Fb>: amplify, don’t lead.<\u002Fdiv><div class=\"plead\">Lead: <b>Comms · Product Marketing<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"phase\"><div class=\"pwhen\">Dec ’26 – Feb ’27<\u002Fdiv><div class=\"pname\">Credibility<\u002Fdiv><div class=\"pmode\">Build credibility, quietly<\u002Fdiv><div class=\"pbody\">Earn the trust of film people. Leans <b>Letterboxd and X<\u002Fb>, low-ego, creator-led — product whispers. The First Look series drops; Sundance, A24 &amp; Letterboxd give endless in-territory moments.<\u002Fdiv><div class=\"plead\">Lead: <b>Social / Creator · Partnerships · Industry SPMs<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"phase\"><div class=\"pwhen\">March ’27<\u002Fdiv><div class=\"pname\">Desirability<\u002Fdiv><div class=\"pmode\">The Oscars, louder<\u002Fdiv><div class=\"pbody\">Own awards season at scale around the <b>Oscars (Mar 14)<\u002Fb> — OOH domination and ceremony integration, with the Star Wars 50th driving irrational desire. Reactive rides the crescendo and can be <b>bolder<\u002Fb>.<\u002Fdiv><div class=\"plead\">Lead: <b>Growth (FOA) / DRM · Industry SPMs · Comms<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"phase\"><div class=\"pwhen\">May – Nov ’27<\u002Fdiv><div class=\"pname\">Rituality<\u002Fdiv><div class=\"pmode\">Surround the fans<\u002Fdiv><div class=\"pbody\">Turn immersive viewing into a ritual — fandom &amp; anniversaries (Superbad 20, Titanic 30), summer travel (Carry On) and the on-sale window, Star Wars 50th the marquee anchor. Widens to <b>in-product &amp; lifecycle<\u002Fb>.<\u002Fdiv><div class=\"plead\">Lead: <b>Social / Creator · BD·PMM · Store / Lifecycle<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 39 · §10 DIVIDER -->\n<div class=\"frame\"><div class=\"slide bg-horizon-2\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad center\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">10 — Thought starters<\u002Fdiv>\n    <h2 class=\"headline\" style=\"text-align:center;\">Moments across the year<\u002Fh2>\n    <p class=\"sub\" style=\"max-width:1280px; margin-top:40px; line-height:1.5;\">Every moment is a mini worked example: the conversation, our way in, the signals that trigger us, and the line we don’t cross. Run each through the filter; talent / studio IP still clears per Section 7.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 40 · §10 FIVE FORCES -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">10<\u002Fspan>&nbsp;Five forces shape how we play every moment<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"orient\">\n        <div class=\"orow\" style=\"padding:20px 4px;\"><div class=\"ot\">Scale ↔ intimacy<\u002Fdiv><div class=\"od\">Never “instead of the theatre.” Alta is a <b>spiritual extension<\u002Fb> of it — auteur-intended scale in a personal space.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:20px 4px;\"><div class=\"ot\">Letterboxd-ification<\u002Fdiv><div class=\"od\">The dominant voice in film culture is the witty, list-making community. Match that register — <b>corporate pronouncements die here.<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:20px 4px;\"><div class=\"ot\">Master-tape reverence<\u002Fdiv><div class=\"od\">Anniversaries are technical re-evaluation windows — aspect ratios, grades, mixes, restorations. <b>“Exactly as the director intended”<\u002Fb> is the magic phrase.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:20px 4px;\"><div class=\"ot\">Auteur as celebrity<\u002Fdiv><div class=\"od\">Directors are the rockstars now. Orient every reaction around <b>the creators<\u002Fb>, not the IP.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:20px 4px;\"><div class=\"ot\">The travel sanctuary<\u002Fdiv><div class=\"od\">Premium, intentional isolation on the move — the ritual that powers summer, festivals and Carry On.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 41 · §10 HOW TO READ THE TIERS -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">10<\u002Fspan>&nbsp;How to read the moments<\u002Fdiv>\n    <h2 class=\"s-head\">Tiering the year<\u002Fh2>\n    <div class=\"body-area gap\" style=\"justify-content:center;\">\n      <div class=\"mchips\" style=\"gap:16px;\">\n        <span class=\"chip t1\">Tier 1 · Anchor<\u002Fspan>\n        <span class=\"chip t2\">Tier 2 · Targeted<\u002Fspan>\n        <span class=\"chip t3\">Tier 3 · Light touch<\u002Fspan>\n        <span class=\"chip own\">Owned / Always on<\u002Fspan>\n        <span class=\"chip dw\">Date watch<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"orient\" style=\"margin-top:8px;\">\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Tier 1 · Anchor<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Pre-plan and invest — assets ready <b>before<\u002Fb> the moment.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Tier 2 · Targeted<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Agile owned posts and creator support.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Tier 3 · Light touch<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">One sharp beat, or simply observe.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Date watch<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">The date is speculative — track the signals; <b>build nothing against the calendar until it’s confirmed.<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- 42 · MOMENTS · RELEASES 1 -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\" style=\"padding:84px 110px 80px;\">\n    <div class=\"kicker\"><span class=\"knum\">10<\u002Fspan>&nbsp;Moments · Releases<\u002Fdiv>\n    <div class=\"body-area\" style=\"margin-top:24px; justify-content:center;\">\n      <div class=\"grid-2\" style=\"align-items:stretch; gap:30px;\">\n        <div class=\"mcard\">\n          <div class=\"mhead\"><div class=\"mname\">Klara and the Sun<\u002Fdiv><div class=\"mdate\">~Oct 23 ’26<\u002Fdiv><\u002Fdiv>\n          <div class=\"mchips\"><span class=\"chip t2\">Tier 2<\u002Fspan><span class=\"chip dw\">Date watch<\u002Fspan><\u002Fdiv>\n          <div class=\"midea\">Prestige, melancholy, Waititi adapting Ishiguro. Go <b>reverent and intimate<\u002Fb> — immersion as closeness, not spectacle.<\u002Fdiv>\n          <div class=\"mgrid\">\n            <div class=\"mline\"><div class=\"mk\">Conversation<\u002Fdiv><div class=\"mv\">BookTok crosses into Film Twitter — AI, loneliness and human connection through an artificial observer’s eyes.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline\"><div class=\"mk\">Way in<\u002Fdiv><div class=\"mv\">Intimacy over spectacle: the film’s singular visual perspective and <b>“films you want to disappear inside.”<\u002Fb><\u002Fdiv><\u002Fdiv>\n            <div class=\"mline\"><div class=\"mk\">Watch for<\u002Fdiv><div class=\"mv\">The review embargo lifting; breakout performance praise; “did Waititi capture the book’s tone” debates.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline warn\"><div class=\"mk\">Careful<\u002Fdiv><div class=\"mv\">The film is about a lonely artificial companion — <b>Alta must never read as one.<\u002Fb> We’re a window into human stories.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mcard\">\n          <div class=\"mhead\"><div class=\"mname\">Avengers: Doomsday<\u002Fdiv><div class=\"mdate\">Dec 18 ’26<\u002Fdiv><\u002Fdiv>\n          <div class=\"mchips\"><span class=\"chip t3\">Tier 3<\u002Fspan><\u002Fdiv>\n          <div class=\"midea\">Huge volume, low cinephile cred. <b>Play the sheer scale<\u002Fb>; keep a respectful distance from the IP.<\u002Fdiv>\n          <div class=\"mgrid\">\n            <div class=\"mline\"><div class=\"mk\">Conversation<\u002Fdiv><div class=\"mv\">Box-office horse-race, fatigue-vs-revival debates, chaotic memeable fandom — everywhere, all at once.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline\"><div class=\"mk\">Way in<\u002Fdiv><div class=\"mv\">Never the inside jokes. The crushing visual density of a tentpole — <b>minus the noisy holiday crowd.<\u002Fb> Clean, minimal, scale-only.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline\"><div class=\"mk\">Watch for<\u002Fdiv><div class=\"mv\">Premiere reaction threads; “the audience ruined the twist” complaints; VFX-quality debates.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline warn\"><div class=\"mk\">Careful<\u002Fdiv><div class=\"mv\">Playing comic-book fan account = instant cringe. The <b>experience of the scale<\u002Fb> is our only line in.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n\n<!-- MOMENTS · Releases -->\n<div class=\"frame\"><div class=\"slide bg-abyss\">\n  <div class=\"fc\">Reality Labs × Mother<\u002Fdiv>\n  <div class=\"fp\"><\u002Fdiv>\n  <div class=\"fconf\">Project Alta | Proprietary and Confidential<\u002Fdiv>\n  <div class=\"pad\" style=\"padding:84px 110px 80px;\">\n    <div class=\"kicker\"><span class=\"knum\">10<\u002Fspan>&nbsp;Moments · Releases<\u002Fdiv>\n    <div class=\"body-area\" style=\"margin-top:24px; justify-content:center;\">\n      <div class=\"grid-2\" style=\"align-items:stretch; gap:30px;\"><div class=\"mcard\">\n          <div class=\"mhead\"><div class=\"mname\">Dune: Part Three<\u002Fdiv><div class=\"mdate\">~Dec 18 ’26<\u002Fdiv><\u002Fdiv>\n          <div class=\"mchips\"><span class=\"chip t1\">Tier 1<\u002Fspan><span class=\"chip dw\">Date watch<\u002Fspan><\u002Fdiv>\n          <div class=\"midea\">The holy grail. Pure reverence — Villeneuve, Zimmer’s sub-bass, the definitive epic. <b>Our biggest release play of the year.<\u002Fb><\u002Fdiv>\n          <div class=\"mgrid\">\n            <div class=\"mline\"><div class=\"mk\">Conversation<\u002Fdiv><div class=\"mv\">Film culture’s most anticipated event — world-building worship, IMAX aspect-ratio talk, the preservation of epic cinema. Lives on Letterboxd, r/movies and Film X.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline\"><div class=\"mk\">Way in<\u002Fdiv><div class=\"mv\">The technical-validation moment: <b>“for those who missed the IMAX run — or refuse to let it go.”<\u002Fb> Sound and scale as fan worship; the auteur front and centre.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline\"><div class=\"mk\">Watch for<\u002Fdiv><div class=\"mv\">WB confirming (or shifting) the window; trailer aspect ratios; tickets on sale; the score dropping early.<\u002Fdiv><\u002Fdiv>\n            <div class=\"mline warn\"><div class=\"mk\">Careful<\u002Fdiv><div class=\"mv\">The date is an industry placeholder — it could slip to late ’27 / ’28. <b>Build nothing against the calendar until i idential<\u002Fdiv>\n  <div class=\"pad\">\n    <div class=\"kicker\"><span class=\"knum\">11<\u002Fspan>&nbsp;The brief<\u002Fdiv>\n    <div class=\"body-area\" style=\"justify-content:center;\">\n      <div class=\"orient\">\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Objective<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Establish Alta as the definitive home-cinema platform for the 50th.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Position<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Complement the theatrical limited run — don’t compete. Alta as the premier <b>personal<\u002Fb> immersive environment.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">IP stance<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Minimise IP / logo licensing. <b>Creator-led and fan-driven<\u002Fb> relevance, leaning into the ecosystem — not hard brand assets.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Creative<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Meta’s VR-enhanced ‘A New Hope’, framed through <b>‘See How It Feels’<\u002Fb> — immersion, “closer than ever.”<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Reach<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">‘A New Hope’ as the vehicle into the wider franchise; explore the Harrison Ford first-look demo for the product reveal.<\u002Fdiv><\u002Fdiv>\n        <div class=\"orow\" style=\"padding:18px 4px;\"><div class=\"ot\">Timing<\u002Fdiv><div class=\"od\" style=\"font-size:26px;\">Announce VR <b>Feb 19<\u002Fb> · Demo VR <b>April<\u002Fb> — bridges the Oscars launch into On-Shelf.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<!-- §11 HOW REACTIVE PLAYS IT -->\n<div class=\"frame\"><div class=\"slide bg-abyss\
